<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>E156 Interactive Bundle</title>
  <style>
    :root {
      --bg: #f6f3ee;
      --paper: rgba(255, 255, 255, 0.92);
      --paper-strong: #fbfaf7;
      --ink: #111111;
      --muted: #5f5a53;
      --line: #ddd5ca;
      --line-strong: #b8aea2;
      --accent: #326891;
      --accent-soft: #e8f0f6;
      --review: #6b5435;
      --good: #216c53;
      --warn: #a06a12;
      --bad: #922b21;
      --shadow: 0 16px 38px rgba(17, 17, 17, 0.045);
      --radius: 8px;
      --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      --sans: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(50, 104, 145, 0.08), transparent 28%),
        linear-gradient(180deg, #fcfbf8 0%, var(--bg) 100%);
      font-family: var(--serif);
      line-height: 1.5;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      width: min(1280px, calc(100vw - 48px));
      margin: 18px auto 72px;
      display: grid;
      gap: 24px;
    }

    .masthead {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      padding: 10px 0 18px;
      border-top: 1px solid var(--line-strong);
      border-bottom: 3px double var(--line);
      animation: rise-in 0.65s ease-out both;
    }

    .masthead-brand {
      font-family: var(--serif);
      font-size: clamp(30px, 4vw, 46px);
      font-weight: 700;
      letter-spacing: -0.035em;
    }

    .masthead-meta {
      max-width: 38ch;
      font-family: var(--sans);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      text-align: right;
      line-height: 1.6;
    }

    .hero,
    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 40px clamp(22px, 4vw, 52px) 34px;
      border-top: 4px solid var(--ink);
      animation: rise-in 0.72s ease-out both;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -10% -40% auto;
      width: 44%;
      aspect-ratio: 1;
      background: radial-gradient(circle, rgba(50, 104, 145, 0.13), transparent 68%);
      pointer-events: none;
    }

    .eyebrow {
      position: relative;
      z-index: 1;
      color: var(--accent);
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0 0 16px;
      max-width: 13ch;
      font-family: var(--serif);
      font-size: clamp(42px, 6vw, 78px);
      line-height: 0.97;
      letter-spacing: -0.05em;
      font-weight: 700;
      text-wrap: balance;
    }

    .lede {
      position: relative;
      z-index: 1;
      color: #464038;
      max-width: 56rem;
      margin: 0;
      font-size: clamp(19px, 2.2vw, 25px);
      line-height: 1.62;
      font-style: normal;
      text-wrap: pretty;
    }

    .hero-rail {
      position: relative;
      z-index: 1;
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      font-family: var(--sans);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }

    .hero-rail > div {
      padding: 12px 14px;
      border-top: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.62);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(290px, 0.95fr);
      gap: 24px;
      animation: rise-in 0.72s ease-out 0.08s both;
    }

    .card {
      padding: 26px clamp(18px, 2.4vw, 30px);
      border-radius: var(--radius);
      animation: rise-in 0.72s ease-out 0.14s both;
    }

    article.card {
      border-top: 3px solid var(--ink);
    }

    aside.card {
      align-self: start;
      position: sticky;
      top: 20px;
      border-top: 3px solid var(--accent);
    }

    .section-title {
      margin: 0 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      font-family: var(--sans);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
    }

    .body-text {
      max-width: 29ch;
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(23px, 2.3vw, 31px);
      line-height: 1.77;
      text-wrap: pretty;
    }

    .nyt-dropcap::first-letter {
      float: left;
      font-family: var(--serif);
      font-size: 4.85rem;
      line-height: 0.82;
      padding: 0.09em 0.12em 0 0;
      color: var(--accent);
      font-weight: 700;
    }

    .body-foot {
      margin-top: 22px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      font-family: var(--sans);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.8;
    }

    .stats {
      display: grid;
      gap: 12px;
    }

    .stat {
      padding: 16px;
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      background: var(--paper-strong);
    }

    .stat-label {
      color: var(--muted);
      font-family: var(--sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--sans);
      font-size: 30px;
      font-weight: 800;
      line-height: 1.05;
      color: var(--ink);
    }

    .stat-small .stat-value {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 700;
      color: var(--ink);
    }

    .note-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .note-item {
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: var(--paper-strong);
      min-height: 110px;
    }

    .note-item strong {
      display: block;
      font-family: var(--sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .note-item a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease;
    }

    .note-item a:hover {
      border-color: currentColor;
    }

    .note-value {
      font-size: 15px;
      line-height: 1.6;
    }

    .study-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.78);
    }

    .study-table th,
    .study-table td {
      padding: 12px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    .study-table th {
      text-align: left;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      background: #f8f5ef;
    }

    .study-table tbody tr:hover {
      background: rgba(50, 104, 145, 0.045);
    }

    .study-table tbody tr:nth-child(even) {
      background: rgba(248, 245, 239, 0.7);
    }

    .data-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .data-search-wrap {
      flex: 1 1 320px;
      max-width: 520px;
    }

    .data-search-label,
    .data-summary-label {
      display: block;
      margin-bottom: 8px;
      font-family: var(--sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
    }

    .data-search {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .data-search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(50, 104, 145, 0.12);
    }

    .data-summary {
      min-width: 180px;
      padding: 13px 14px;
      border: 1px solid var(--line);
      background: var(--paper-strong);
      font-family: var(--sans);
      font-size: 13px;
      line-height: 1.5;
      color: var(--ink);
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-family: var(--sans);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--accent-soft);
      color: var(--accent);
    }

    .chip.pass {
      background: rgba(33, 108, 83, 0.1);
      border-color: rgba(33, 108, 83, 0.16);
      color: var(--good);
    }

    .chip.revise {
      background: rgba(160, 106, 18, 0.1);
      border-color: rgba(160, 106, 18, 0.18);
      color: var(--warn);
    }

    .chip.block {
      background: rgba(146, 43, 33, 0.11);
      border-color: rgba(146, 43, 33, 0.18);
      color: var(--bad);
    }

    .plot-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      padding: 18px;
      background: rgba(255, 255, 255, 0.9);
    }

    .plot-caption {
      margin-top: 14px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      line-height: 1.8;
    }

    @media (max-width: 1100px) {
      .grid {
        grid-template-columns: 1fr;
      }

      aside.card {
        position: static;
      }

      .hero-rail {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .page {
        width: min(100vw - 28px, 1280px);
        margin: 14px auto 48px;
        gap: 18px;
      }

      .masthead {
        flex-direction: column;
        align-items: start;
      }

      .masthead-meta {
        text-align: left;
      }

      .body-text {
        font-size: 20px;
      }

      .note-grid {
        grid-template-columns: 1fr;
      }

      .data-toolbar {
        align-items: stretch;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .masthead,
      .hero,
      .grid,
      .card {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div class="masthead-brand">E156 Interactive Edition</div>
      <div class="masthead-meta" id="masthead-meta">Interactive paper companion</div>
    </header>

    <section class="hero">
      <div class="eyebrow">Interactive Paper Companion</div>
      <h1 id="title" class="nyt-headline"></h1>
      <p class="lede nyt-subhead" id="lede"></p>
      <div class="hero-rail">
        <div id="hero-type">Type</div>
        <div id="hero-version">Version</div>
        <div id="hero-date">Date</div>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h2 class="section-title">Paper</h2>
        <p class="body-text nyt-dropcap" id="body"></p>
        <div class="body-foot" id="body-foot">The frozen body stands alone while the surrounding page carries the wider evidence layer.</div>
      </article>

      <aside class="card">
        <h2 class="section-title">Evidence Snapshot</h2>
        <div class="stats" id="core-stats"></div>
      </aside>
    </section>

    <section class="card">
      <h2 class="section-title">Interactive Plot</h2>
      <div class="plot-wrap">
        <svg id="forest-plot" width="980" height="360" aria-label="forest plot"></svg>
      </div>
      <div class="plot-caption" id="plot-caption"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Methods And Sources</h2>
      <div class="note-grid" id="note-grid"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Data Explorer</h2>
      <div class="data-toolbar">
        <div class="data-search-wrap">
          <label class="data-search-label" for="study-filter">Filter studies or effects</label>
          <input id="study-filter" class="data-search" type="search" placeholder="Search study label, effect, or weight">
        </div>
        <div>
          <div class="data-summary-label">Rows shown</div>
          <div class="data-summary" id="data-summary">0 rows</div>
        </div>
      </div>
      <div class="table-wrap">
        <table class="study-table" id="study-table"></table>
      </div>
    </section>
  </main>

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function appendStat(container, label, value, useSmallValue) {
      const card = el("div", useSmallValue ? "stat stat-small" : "stat");
      card.append(el("div", "stat-label", label));
      card.append(el("div", "stat-value", value ?? "—"));
      container.append(card);
    }

    function renderCore(article) {
      document.getElementById("title").textContent = article.title || "Untitled E156 record";
      document.getElementById("lede").textContent =
        article.summary ||
        "A frozen 156-word body paired with a richer interactive evidence layer.";
      document.getElementById("body").textContent = article.body || "";
      document.getElementById("masthead-meta").textContent = `${article.date || "Undated"} | ${article.version || "No version"} | interactive evidence edition`;
      document.getElementById("hero-type").textContent = `Type: ${article.type || "-"}`;
      document.getElementById("hero-version").textContent = `Version: ${article.version || "-"}`;
      document.getElementById("hero-date").textContent = `Date: ${article.date || "-"}`;
      document.getElementById("body-foot").textContent = `Primary estimand: ${article.primary_estimand || "-"} | certainty: ${article.certainty || "-"}`;

      const core = document.getElementById("core-stats");
      appendStat(core, "Type", article.type);
      appendStat(core, "Primary Estimand", article.primary_estimand, true);
      appendStat(core, "Studies", article.study_count);
      appendStat(core, "Participants", article.participant_count);
      appendStat(core, "Version", article.version, true);
      appendStat(core, "Certainty", article.certainty, true);
    }

    function renderNotes(article) {
      const fields = [
        ["App", article.app],
        ["Data", article.data],
        ["Code", article.code],
        ["DOI", article.doi],
        ["Version", article.version],
        ["Date", article.date],
        ["Validation", article.validation?.status],
        ["Protocol", article.protocol],
        ["Source article", article.source_article]
      ];

      const grid = document.getElementById("note-grid");
      fields.forEach(([label, value]) => {
        const item = el("div", "note-item");
        item.append(el("strong", "", label));
        if (!value) {
          item.append(el("div", "", "—"));
        } else if (typeof value === "string" && /^https?:/i.test(value)) {
          const link = el("a", "", value);
          link.href = value;
          link.target = "_blank";
          link.rel = "noreferrer";
          item.append(link);
        } else {
          item.append(el("div", "", String(value)));
        }
        grid.append(item);
      });
    }

    function renderValidation(article) {
      const table = document.getElementById("validation-table");
      const checks = article.validation?.checks || [];
      checks.forEach((check) => {
        const row = document.createElement("tr");
        row.innerHTML = `<td><span class="chip ${check.ok ? "pass" : "block"}">${check.ok ? "PASS" : "FAIL"}</span></td><td>${check.name}</td><td>${check.detail || ""}</td>`;
        table.append(row);
      });
    }

    function renderReviewBoard(article) {
      const board = document.getElementById("review-board");
      const review = article.review || null;

      if (!review || !review.personas || !Object.keys(review.personas).length) {
        board.innerHTML = `<div><span class="chip">PENDING</span> Reviewer assignments appear when a multi-persona review is attached.</div>`;
        return;
      }

      board.innerHTML = "";
      Object.entries(review.personas || {}).forEach(([name, persona]) => {
        const item = document.createElement("article");
        const personaVerdict = normalizeVerdict(persona.verdict);
        const reviewerId = persona.reviewer_id || personaLabel(name);
        const signedAt = persona.signed_at || review.reviewed_at || article.date || "-";
        item.className = "review-board-item";
        item.innerHTML = `
          <div class="review-card-head">
            <div>
              <div class="review-board-role">${personaLabel(name)}</div>
              <div class="review-board-name">${reviewerId}</div>
            </div>
            <span class="chip ${personaVerdict}">${String(persona.verdict || "unknown").toUpperCase()}</span>
          </div>
          <div class="review-board-meta">Signed ${signedAt}</div>
        `;
        board.append(item);
      });
    }

    function renderReview(article) {
      const table = document.getElementById("review-table");
      const review = article.review || null;
      const summary = article.review_summary || null;

      if (!review || !summary) {
        table.innerHTML = `<div><span class="chip">NONE</span> No multi-persona review attached.</div>`;
        return;
      }

      const actions = (summary.required_actions || [])
        .map((entry) => `${entry.persona}: ${entry.action}`)
        .join(" | ");
      const verdict = normalizeVerdict(summary.gate);
      table.innerHTML = `
        <div class="consensus-card">
          <div class="consensus-head">
            <div>
              <div class="consensus-label">Consensus Gate</div>
              <div class="consensus-value">${String(summary.gate || "unknown").toUpperCase()}</div>
              <div class="consensus-meta">Filed ${review.reviewed_at || article.date || "-"}</div>
            </div>
            <span class="chip ${verdict}">${String(summary.gate || "unknown").toUpperCase()}</span>
          </div>
          <div>Pass ${summary.verdict_counts?.pass ?? 0} | Revise ${summary.verdict_counts?.revise ?? 0} | Block ${summary.verdict_counts?.block ?? 0}</div>
          <div style="margin-top:10px; color: var(--muted);">${actions || "No mandatory actions recorded."}</div>
        </div>
        <div class="review-grid" id="review-grid"></div>
      `;

      const grid = document.getElementById("review-grid");
      Object.entries(review.personas || {}).forEach(([name, persona]) => {
        const card = document.createElement("article");
        const personaVerdict = normalizeVerdict(persona.verdict);
        const reviewerId = persona.reviewer_id || personaLabel(name);
        const signedAt = persona.signed_at || review.reviewed_at || article.date || "-";
        const actionsList = Array.isArray(persona.required_actions) && persona.required_actions.length
          ? `<div class="review-actions"><strong>Required actions</strong><ul>${persona.required_actions.map((action) => `<li>${action}</li>`).join("")}</ul></div>`
          : "";
        card.className = "review-card";
        card.innerHTML = `
          <div class="review-card-head">
            <div class="reviewer-name">${personaLabel(name)}</div>
            <span class="chip ${personaVerdict}">${String(persona.verdict || "unknown").toUpperCase()}</span>
          </div>
          <div class="review-focus">${persona.focus || ""}</div>
          <p class="review-notes">${persona.notes || ""}</p>
          ${actionsList}
          <div class="review-signoff">Signed ${signedAt} by ${reviewerId}</div>
        `;
        grid.append(card);
      });
    }

    function renderStudyTable(article) {
      const table = document.getElementById("study-table");
      const studies = article.studies || [];
      table.innerHTML = `
        <thead>
          <tr>
            <th>Study</th>
            <th>Effect</th>
            <th>Lower</th>
            <th>Upper</th>
            <th>Weight</th>
          </tr>
        </thead>
        <tbody></tbody>
      `;
      const tbody = table.querySelector("tbody");

      if (!studies.length) {
        const row = document.createElement("tr");
        row.innerHTML = `<td colspan="5">No study-level rows embedded in this bundle.</td>`;
        tbody.append(row);
        return;
      }

      studies.forEach((study) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${study.label ?? ""}</td>
          <td>${study.effect ?? ""}</td>
          <td>${study.lower ?? ""}</td>
          <td>${study.upper ?? ""}</td>
          <td>${study.weight ?? ""}</td>
        `;
        tbody.append(row);
      });
    }

    function appendStat(container, label, value, useSmallValue) {
      const card = el("div", useSmallValue ? "stat stat-small" : "stat");
      card.append(el("div", "stat-label", label));
      card.append(el("div", "stat-value", value ?? "-"));
      container.append(card);
    }

    function renderCore(article) {
      document.getElementById("title").textContent = article.title || "Untitled E156 record";
      document.getElementById("lede").textContent =
        article.summary ||
        "A frozen 156-word body paired with a richer interactive evidence layer.";
      document.getElementById("body").textContent = article.body || "";
      document.getElementById("masthead-meta").textContent = `${article.date || "Undated"} | ${article.version || "No version"} | interactive paper companion`;
      document.getElementById("hero-type").textContent = `Type: ${article.type || "-"}`;
      document.getElementById("hero-version").textContent = `Version: ${article.version || "-"}`;
      document.getElementById("hero-date").textContent = `Date: ${article.date || "-"}`;
      document.getElementById("body-foot").textContent =
        `Primary estimand: ${article.primary_estimand || "-"} | certainty: ${article.certainty || "-"} | readers can inspect the plot and study-level data below.`;

      const core = document.getElementById("core-stats");
      core.innerHTML = "";
      appendStat(core, "Type", article.type);
      appendStat(core, "Primary Estimand", article.primary_estimand, true);
      appendStat(core, "Studies", article.study_count);
      appendStat(core, "Participants", article.participant_count);
      appendStat(core, "Version", article.version, true);
      appendStat(core, "Certainty", article.certainty, true);
    }

    function renderNotes(article) {
      const fields = [
        ["App", article.app],
        ["Data", article.data],
        ["Code", article.code],
        ["DOI", article.doi],
        ["Version", article.version],
        ["Date", article.date],
        ["Protocol", article.protocol],
        ["Source article", article.source_article]
      ];

      const grid = document.getElementById("note-grid");
      grid.innerHTML = "";
      fields.forEach(([label, value]) => {
        const item = el("div", "note-item");
        item.append(el("strong", "", label));
        if (!value) {
          item.append(el("div", "note-value", "-"));
        } else if (typeof value === "string" && /^https?:/i.test(value)) {
          const link = el("a", "note-value", value);
          link.href = value;
          link.target = "_blank";
          link.rel = "noreferrer";
          item.append(link);
        } else {
          item.append(el("div", "note-value", String(value)));
        }
        grid.append(item);
      });
    }

    function renderStudyTable(article) {
      const table = document.getElementById("study-table");
      const searchInput = document.getElementById("study-filter");
      const summary = document.getElementById("data-summary");
      const studies = article.studies || [];

      const renderRows = () => {
        const query = String(searchInput?.value || "").trim().toLowerCase();
        const filtered = studies.filter((study) => {
          if (!query) return true;
          const haystack = [study.label, study.effect, study.lower, study.upper, study.weight]
            .map((value) => String(value ?? "").toLowerCase())
            .join(" ");
          return haystack.includes(query);
        });

        table.innerHTML = `
          <thead>
            <tr>
              <th>Study</th>
              <th>Effect</th>
              <th>Lower</th>
              <th>Upper</th>
              <th>Weight</th>
            </tr>
          </thead>
          <tbody></tbody>
        `;
        const tbody = table.querySelector("tbody");

        if (!studies.length) {
          const row = document.createElement("tr");
          row.innerHTML = `<td colspan="5">No study-level rows are embedded in this interactive companion.</td>`;
          tbody.append(row);
          summary.textContent = "0 of 0 rows";
          return;
        }

        if (!filtered.length) {
          const row = document.createElement("tr");
          row.innerHTML = `<td colspan="5">No rows match the current filter.</td>`;
          tbody.append(row);
          summary.textContent = `0 of ${studies.length} rows`;
          return;
        }

        filtered.forEach((study) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${study.label ?? ""}</td>
            <td>${study.effect ?? ""}</td>
            <td>${study.lower ?? ""}</td>
            <td>${study.upper ?? ""}</td>
            <td>${study.weight ?? ""}</td>
          `;
          tbody.append(row);
        });

        summary.textContent = `${filtered.length} of ${studies.length} rows`;
      };

      if (searchInput) {
        searchInput.addEventListener("input", renderRows);
      }
      renderRows();
    }

    function drawForest(article) {
      const svg = document.getElementById("forest-plot");
      const width = Number(svg.getAttribute("width"));
      const height = Number(svg.getAttribute("height"));
      const margin = { top: 36, right: 36, bottom: 48, left: 240 };
      const studies = article.studies || [];
      const pooled = article.primary_plot?.pooled || null;
      const reference = article.primary_plot?.reference ?? 1;

      while (svg.firstChild) svg.removeChild(svg.firstChild);

      const points = [];
      studies.forEach((s) => {
        if ([s.effect, s.lower, s.upper].every((v) => Number.isFinite(Number(v)))) {
          points.push({
            label: s.label,
            effect: Number(s.effect),
            lower: Number(s.lower),
            upper: Number(s.upper),
            pooled: false
          });
        }
      });
      if (pooled && [pooled.effect, pooled.lower, pooled.upper].every((v) => Number.isFinite(Number(v)))) {
        points.push({
          label: pooled.label || "Pooled",
          effect: Number(pooled.effect),
          lower: Number(pooled.lower),
          upper: Number(pooled.upper),
          pooled: true
        });
      }

      if (!points.length) {
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", "24");
        text.setAttribute("y", "48");
        text.textContent = "No numeric plot data embedded.";
        svg.append(text);
        return;
      }

      const minX = Math.min(...points.map((p) => p.lower), reference);
      const maxX = Math.max(...points.map((p) => p.upper), reference);
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      const rowGap = plotHeight / Math.max(points.length, 1);

      const scale = (value) => {
        if (maxX === minX) return margin.left + plotWidth / 2;
        return margin.left + ((value - minX) / (maxX - minX)) * plotWidth;
      };

      const axis = document.createElementNS("http://www.w3.org/2000/svg", "line");
      axis.setAttribute("x1", margin.left);
      axis.setAttribute("x2", width - margin.right);
      axis.setAttribute("y1", height - margin.bottom);
      axis.setAttribute("y2", height - margin.bottom);
      axis.setAttribute("stroke", "#46505c");
      svg.append(axis);

      const ref = document.createElementNS("http://www.w3.org/2000/svg", "line");
      ref.setAttribute("x1", scale(reference));
      ref.setAttribute("x2", scale(reference));
      ref.setAttribute("y1", margin.top / 2);
      ref.setAttribute("y2", height - margin.bottom);
      ref.setAttribute("stroke", "#9a6a4d");
      ref.setAttribute("stroke-dasharray", "5 5");
      svg.append(ref);

      points.forEach((point, index) => {
        const y = margin.top + index * rowGap + rowGap / 2;

        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("x", "16");
        label.setAttribute("y", String(y + 4));
        label.setAttribute("font-size", "13");
        label.textContent = point.label;
        svg.append(label);

        const ci = document.createElementNS("http://www.w3.org/2000/svg", "line");
        ci.setAttribute("x1", scale(point.lower));
        ci.setAttribute("x2", scale(point.upper));
        ci.setAttribute("y1", y);
        ci.setAttribute("y2", y);
        ci.setAttribute("stroke", point.pooled ? "#0d6b57" : "#4c5b6a");
        ci.setAttribute("stroke-width", point.pooled ? "3" : "2");
        svg.append(ci);

        const marker = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        marker.setAttribute("x", String(scale(point.effect) - (point.pooled ? 7 : 5)));
        marker.setAttribute("y", String(y - (point.pooled ? 7 : 5)));
        marker.setAttribute("width", String(point.pooled ? 14 : 10));
        marker.setAttribute("height", String(point.pooled ? 14 : 10));
        marker.setAttribute("fill", point.pooled ? "#0d6b57" : "#223144");
        marker.setAttribute("rx", "2");
        svg.append(marker);

        const val = document.createElementNS("http://www.w3.org/2000/svg", "text");
        val.setAttribute("x", String(width - margin.right + 6));
        val.setAttribute("y", String(y + 4));
        val.setAttribute("font-size", "12");
        val.textContent = `${point.effect} (${point.lower}, ${point.upper})`;
        svg.append(val);
      });

      const ticks = [minX, reference, maxX].filter((value, idx, arr) => arr.indexOf(value) === idx);
      ticks.forEach((tick) => {
        const tickX = scale(tick);
        const tickLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        tickLine.setAttribute("x1", tickX);
        tickLine.setAttribute("x2", tickX);
        tickLine.setAttribute("y1", String(height - margin.bottom));
        tickLine.setAttribute("y2", String(height - margin.bottom + 8));
        tickLine.setAttribute("stroke", "#46505c");
        svg.append(tickLine);

        const tickText = document.createElementNS("http://www.w3.org/2000/svg", "text");
        tickText.setAttribute("x", String(tickX));
        tickText.setAttribute("y", String(height - margin.bottom + 24));
        tickText.setAttribute("text-anchor", "middle");
        tickText.setAttribute("font-size", "12");
        tickText.textContent = Number(tick).toFixed(2);
        svg.append(tickText);
      });

      document.getElementById("plot-caption").textContent =
        article.primary_plot?.caption ||
        "Primary effect plot generated from embedded numeric values.";
    }

    function renderJson(article) {
      document.getElementById("json-box").textContent = JSON.stringify(article, null, 2);
    }

    renderCore(E156_ARTICLE);
    renderNotes(E156_ARTICLE);
    drawForest(E156_ARTICLE);
    renderStudyTable(E156_ARTICLE);
  </script>
</body>
</html>
